<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - System Failure | Inventory API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 80vh;
        }
        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ef4444, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0.8;
            animation: glitch 3s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-2px, 2px); }
            4% { transform: translate(-2px, -2px); }
            6% { transform: translate(2px, 2px); }
            8% { transform: translate(2px, -2px); }
            10% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="glow-container" aria-hidden="true">
        <div class="glow-blob glow-1" style="background: #ef4444;"></div>
        <div class="glow-blob glow-2" style="background: #f97316;"></div>
    </div>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="noise-overlay" aria-hidden="true"></div>

    <div class="page-wrapper">
        <main class="content-container">
            <div class="error-container animate-on-scroll is-visible">
                <div class="status-badge" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2);">
                    <span class="status-dot" style="background: #ef4444; box-shadow: 0 0 12px #ef4444;"></span>
                    <span class="status-text" style="color: #ef4444;">System Integrity Compromised</span>
                </div>
                
                <h1 class="error-code">500</h1>
                
                <h2 style="font-size: 2rem; margin-bottom: 1.5rem;">Critical Failure</h2>
                <p class="hero-description" style="margin-bottom: 3rem;">
                    The core engine encountered an unhandled exception during execution.<br>
                    Our automated systems are currently diagnosticating the breach.
                </p>
                
                <div class="action-group">
                    <a href="mailto:admin@example.com" class="btn btn-secondary">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        Report Issue
                    </a>
                    <a href="/" class="btn btn-primary">
                        Return Home
                    </a>
                </div>
            </div>
        </main>
        <footer class="main-footer">
            <p class="footer-text">&copy; <span id="year"></span> Systems Architecture Management.</p>
        </footer>
    </div>
    <script src="/main.js"></script>
</body>
</html>
