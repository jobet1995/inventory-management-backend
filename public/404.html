<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Command Not Found | Inventory API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 80vh;
        }
        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #f43f5e, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="glow-container" aria-hidden="true">
        <div class="glow-blob glow-1" style="background: #f43f5e;"></div>
        <div class="glow-blob glow-2"></div>
    </div>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="noise-overlay" aria-hidden="true"></div>

    <div class="page-wrapper">
        <main class="content-container">
            <div class="error-container animate-on-scroll is-visible">
                <div class="status-badge" style="background: rgba(244, 63, 94, 0.1); border-color: rgba(244, 63, 94, 0.2);">
                    <span class="status-dot" style="background: #f43f5e; box-shadow: 0 0 12px #f43f5e;"></span>
                    <span class="status-text" style="color: #f43f5e;">Resource Not Found</span>
                </div>
                
                <h1 class="error-code">404</h1>
                
                <h2 style="font-size: 2rem; margin-bottom: 1.5rem;">Command Not Found</h2>
                <p class="hero-description" style="margin-bottom: 3rem;">
                    The endpoint you requested is outside of known operational parameters.<br>
                    Verify the URL or consult the core documentation.
                </p>
                
                <div class="action-group">
                    <a href="/" class="btn btn-primary">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        Return Home
                    </a>
                </div>
            </div>
        </main>
        <footer class="main-footer">
            <p class="footer-text">&copy; <span id="year"></span> Systems Architecture Management.</p>
        </footer>
    </div>
    <script src="/main.js"></script>
</body>
</html>
